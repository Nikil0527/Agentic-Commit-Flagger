# alert rules the agent will respond to - picked up automatically by the prometheus operator
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: commit-flagger-alerts
  namespace: monitoring
spec:
  groups:
    - name: app-health
      rules:
        - alert: HighErrorRate
          # more than 5% of a service's requests failing with 5xx
          expr: >
            sum by (service_name) (rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
            / sum by (service_name) (rate(http_server_request_duration_seconds_count[5m])) > 0.05
          for: 2m
          labels:
            severity: critical
            failure_class: error-spike
          annotations:
            summary: "{{ $labels.service_name }} error rate above 5%"
            description: "{{ $labels.service_name }} is failing {{ $value | humanizePercentage }} of requests over the last 5 minutes."

        - alert: HighP99Latency
          # slowest 1% of requests taking over a second
          expr: >
            histogram_quantile(0.99, sum by (service_name, le) (rate(http_server_request_duration_seconds_bucket[5m]))) > 1
          for: 5m
          labels:
            severity: warning
            failure_class: latency
          annotations:
            summary: "{{ $labels.service_name }} p99 latency above 1s"
            description: "{{ $labels.service_name }} p99 latency is {{ $value }}s over the last 5 minutes."

    - name: cluster-health
      rules:
        - alert: PodCrashLooping
          # more than 3 restarts in 15m means it's not a one-off blip
          expr: increase(kube_pod_container_status_restarts_total{namespace!="kube-system"}[15m]) > 3
          for: 2m
          labels:
            severity: critical
            failure_class: crash-loop
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} restarted more than 3 times in 15 minutes."

        - alert: PodMemorySaturation
          # working set near the limit means the oom killer is coming
          expr: >
            container_memory_working_set_bytes{container!=""}
            / on(namespace, pod, container)
            kube_pod_container_resource_limits{resource="memory"} > 0.9
          for: 5m
          labels:
            severity: warning
            failure_class: memory-saturation
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} memory above 90% of limit"
            description: "Container {{ $labels.container }} has been over 90% of its memory limit for 5 minutes."
