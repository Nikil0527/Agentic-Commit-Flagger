# otel demo trimmed down since it ships observability tools we already run ourselves

opentelemetry-collector:
  config:
    exporters:
      otlphttp/prometheus:
        endpoint: http://monitoring-kube-prometheus-prometheus.monitoring:9090/api/v1/otlp

opensearch:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false

components:
  frontend-proxy:
    service:
      type: NodePort
      nodePort: 30080

  # the flagd ui sidecar oom loops on boot at any limit from a broken image and we do not need it
  flagd:
    sidecarContainers: []
