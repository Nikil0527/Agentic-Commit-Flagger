# kube-prometheus-stack trimmed down for a local kind cluster

# kind hides these control-plane components from scraping, disable so we don't get dead targets
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false

grafana:
  adminPassword: admin

prometheus:
  prometheusSpec:
    # pick up alert rules from anywhere in the cluster, not just ones the chart created
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    # let the demo app's otel collector push metrics straight to prometheus
    enableOTLPReceiver: true
    retention: 24h
    resources:
      requests:
        cpu: 200m
        memory: 400Mi

alertmanager:
  # route everything to the agent webhook - it runs on the host during dev,
  # host.docker.internal reaches out of the kind container
  config:
    route:
      receiver: agent
      group_by: [alertname, job, namespace]
      group_wait: 15s
      group_interval: 2m
      repeat_interval: 6h
      routes:
        - receiver: "null"
          matchers:
            - alertname = "Watchdog"
    receivers:
      - name: "null"
      - name: agent
        webhook_configs:
          - url: http://host.docker.internal:8000/webhook/alertmanager
            send_resolved: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
